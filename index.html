<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Store Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#0b0f1a;color:white;}

nav{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:#020617;
}

.hero{
height:60vh;
background:url("https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg") center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111827;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{padding:15px;}

.price{color:#00ffcc;font-weight:bold;}

button{
margin-top:10px;
width:100%;
padding:10px;
background:#00ffcc;
border:none;
cursor:pointer;
}

.result{
position:fixed;
bottom:20px;
right:20px;
background:#020617;
padding:15px;
display:none;
border-radius:10px;
}
</style>
</head>

<body>

<nav>
<h2>EV Store ⚡</h2>
</nav>

<div class="hero">
<h1>Buy Electric Cars & Parts</h1>
</div>

<h2 style="text-align:center;margin-top:20px;">🚗 Cars</h2>
<div class="grid" id="cars"></div>

<h2 style="text-align:center;">🔧 Parts</h2>
<div class="grid" id="parts"></div>

<div class="result" id="result"></div>

<script>

/* 🚗 سيارات (صور مختلفة) */
let cars = [
{name:"Tesla Model 3",price:"40000$",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Tesla Model Y",price:"52000$",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"BMW i4",price:"55000$",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Audi e-tron",price:"70000$",img:"https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg"},
{name:"Hyundai Ioniq 5",price:"45000$",img:"https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg"},
{name:"Kia EV6",price:"48000$",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Nissan Leaf",price:"30000$",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Mercedes EQS",price:"90000$",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"Ford Mach-E",price:"60000$",img:"https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg"},
{name:"Volkswagen ID4",price:"47000$",img:"https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg"}
];

/* 🔧 قطع (صور مختلفة) */
let parts = [
{name:"EV Charger",price:"500$",img:"https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg"},
{name:"Battery Pack",price:"5000$",img:"https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg"},
{name:"Car Engine",price:"3000$",img:"https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg"},
{name:"Brake Pads",price:"200$",img:"https://images.pexels.com/photos/1005644/pexels-photo-1005644.jpeg"},
{name:"Car Wheels",price:"800$",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"LED Lights",price:"150$",img:"https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg"},
{name:"Camera",price:"300$",img:"https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg"},
{name:"Cooling System",price:"700$",img:"https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg"},
{name:"GPS",price:"250$",img:"https://images.pexels.com/photos/1005644/pexels-photo-1005644.jpeg"}
];

/* إنشاء كارت */
function create(item){
return `
<div class="card">
<img src="${item.img}">
<div class="card-content">
<h3>${item.name}</h3>
<p class="price">${item.price}</p>
<button onclick="buy('${item.name}')">Buy</button>
</div>
</div>`;
}

/* عرض */
function show(){
document.getElementById("cars").innerHTML = cars.map(create).join("");
document.getElementById("parts").innerHTML = parts.map(create).join("");
}
show();

/* شراء */
function buy(name){
let box=document.getElementById("result");
box.style.display="block";
box.innerText="Added to cart: "+name+" 🛒";
setTimeout(()=>box.style.display="none",3000);
}

</script>

</body>
</html>
