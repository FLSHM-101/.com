<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart EV Store</title>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:Arial;}

nav{
padding:15px;
background:#020617;
display:flex;
justify-content:space-between;
}

.hero{
height:50vh;
background:url("https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg") center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#111827;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{padding:12px;}

.price{color:#00ffcc;}

button{
width:100%;
padding:10px;
background:#00ffcc;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<h2>Smart EV Store ⚡</h2>
</nav>

<div class="hero">
<h1>AI Smart Product Images</h1>
</div>

<h2 style="text-align:center;">Cars 🚗</h2>
<div class="grid" id="cars"></div>

<h2 style="text-align:center;">Parts 🔧</h2>
<div class="grid" id="parts"></div>

<script>

/* =========================
   SMART IMAGE ENGINE
========================= */
function getImage(name, type){

let key = name.toLowerCase();

/* SMART CAR MATCHING */
if(type === "car"){
if(key.includes("tesla")) return "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg";
if(key.includes("bmw")) return "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg";
if(key.includes("audi")) return "https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg";
if(key.includes("mercedes")) return "https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg";
if(key.includes("hyundai")) return "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg";
if(key.includes("kia")) return "https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg";
return "https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg";
}

/* SMART PART MATCHING */
if(type === "part"){
if(key.includes("battery")) return "https://images.pexels.com/photos/3806271/pexels-photo-3806271.jpeg";
if(key.includes("charger")) return "https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg";
if(key.includes("wheel")) return "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg";
if(key.includes("camera")) return "https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg";
if(key.includes("light")) return "https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg";
return "https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg";
}
}

/* =========================
   DATA (only names + price)
========================= */

let cars = [
"Tesla Model 3","Tesla Model Y","BMW i4","Audi e-tron",
"Mercedes EQS","Hyundai Ioniq 5","Kia EV6","Nissan Leaf",
"Ford Mustang Mach-E","Volkswagen ID.4","Porsche Taycan"
];

let parts = [
"EV Battery Pack","Fast Charger","Charging Cable","Car Wheel",
"Brake Pads","Car Camera","LED Lights","Cooling System",
"GPS System","Touch Screen","Motor Controller"
];

/* =========================
   CREATE CARD
========================= */

function card(name,type){
let img = getImage(name,type);

return `
<div class="card">
<img src="${img}">
<div class="card-content">
<h3>${name}</h3>
<p class="price">${Math.floor(Math.random()*50000)+500}$</p>
<button onclick="buy('${name}')">Buy</button>
</div>
</div>`;
}

/* =========================
   DISPLAY
========================= */

document.getElementById("cars").innerHTML =
cars.map(c=>card(c,"car")).join("");

document.getElementById("parts").innerHTML =
parts.map(p=>card(p,"part")).join("");

/* BUY */
function buy(name){
alert("Added to cart: " + name);
}

</script>

</body>
</html>
