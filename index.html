<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart EV Cars Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 25px;
background:#020617;
}

/* HERO */
.hero{
height:55vh;
background:url("https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg") center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

/* SEARCH */
.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:280px;
border:none;
border-radius:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:#111827;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:translateY(-6px);}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.price{
color:#00ffcc;
font-weight:bold;
}

button{
width:100%;
padding:10px;
border:none;
background:#00ffcc;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<h2>EV Cars Store ⚡</h2>
</nav>

<div class="hero">
<h1>Electric Cars Marketplace</h1>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search cars...">
</div>

<h2 style="text-align:center;">🚗 Electric Cars</h2>
<div class="grid" id="cars"></div>

<script>

/* =========================
   SMART IMAGE ENGINE
========================= */
function getImage(name){

let n = name.toLowerCase();

if(n.includes("tesla")) return "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg";
if(n.includes("bmw")) return "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg";
if(n.includes("audi")) return "https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg";
if(n.includes("mercedes")) return "https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg";
if(n.includes("hyundai")) return "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg";
if(n.includes("kia")) return "https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg";
if(n.includes("ford")) return "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg";
if(n.includes("volkswagen")) return "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg";
if(n.includes("porsche")) return "https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg";

return "https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg";
}

/* =========================
   CARS DATA
========================= */

let cars = [
"Tesla Model 3","Tesla Model Y","Tesla Model S","Tesla Model X",
"BMW i4","BMW iX","Audi e-tron","Audi Q4 e-tron",
"Mercedes EQS","Mercedes EQA","Hyundai Ioniq 5","Hyundai Ioniq 6",
"Kia EV6","Nissan Leaf","Ford Mustang Mach-E",
"Volkswagen ID.4","Porsche Taycan","Volvo XC40 Recharge",
"Polestar 2","Chevrolet Bolt"
];

/* =========================
   CARD
========================= */

function card(name){
let img = getImage(name);

return `
<div class="card">
<img src="${img}">
<div class="card-content">
<h3>${name}</h3>
<p class="price">${Math.floor(Math.random()*50000)+10000}$</p>
<button onclick="buy('${name}')">Buy</button>
</div>
</div>`;
}

/* =========================
   DISPLAY
========================= */

function show(){
document.getElementById("cars").innerHTML =
cars.map(card).join("");
}
show();

/* =========================
   SEARCH
========================= */

document.getElementById("search").addEventListener("input",function(){
let val=this.value.toLowerCase();

document.getElementById("cars").innerHTML =
cars.filter(c=>c.toLowerCase().includes(val))
.map(card).join("");
});

/* BUY */
function buy(name){
alert("Added to cart: " + name);
}

</script>

</body>
</html>
