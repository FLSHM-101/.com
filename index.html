<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Cars Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px;
background:#020617;
}

/* HERO */
.hero{
height:50vh;
background:url("https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg") center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:#111827;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.price{
color:#00ffcc;
font-weight:bold;
}

.desc{
font-size:13px;
opacity:0.8;
margin-top:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#00ffcc;
cursor:pointer;
}

/* FORM */
#formBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:20px;
border-radius:12px;
display:none;
width:300px;
}

#formBox input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}

#formBox button{
margin-top:10px;
}
</style>
</head>

<body>

<nav>
<h2>EV Cars Store ⚡</h2>
</nav>

<div class="hero">
<h1>Buy Your Electric Car</h1>
</div>

<h2 style="text-align:center;">🚗 Cars</h2>
<div class="grid" id="cars"></div>

<!-- FORM -->
<div id="formBox">
<h3>Buy Car 🧾</h3>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="address" placeholder="Address">
<button onclick="submitForm()">Confirm Order</button>
</div>

<script>

/* ===== SMART IMAGE ===== */
function getImage(name){
let n=name.toLowerCase();

if(n.includes("tesla")) return "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg";
if(n.includes("bmw")) return "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg";
if(n.includes("audi")) return "https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg";
if(n.includes("mercedes")) return "https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg";
if(n.includes("hyundai")) return "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg";
if(n.includes("kia")) return "https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg";
return "https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg";
}

/* ===== CARS ===== */
let cars = [
{
name:"Tesla Model 3",
price:"40000$",
desc:"Fast electric sedan with long range and modern tech."
},
{
name:"BMW i4",
price:"55000$",
desc:"Luxury electric car with sporty performance."
},
{
name:"Audi e-tron",
price:"70000$",
desc:"Premium SUV with smooth electric driving experience."
},
{
name:"Mercedes EQS",
price:"110000$",
desc:"Top luxury electric sedan with advanced AI features."
},
{
name:"Hyundai Ioniq 5",
price:"45000$",
desc:"Modern design with fast charging technology."
},
{
name:"Kia EV6",
price:"47000$",
desc:"Sporty electric crossover with strong performance."
}
];

let selectedCar="";

/* ===== CARD ===== */
function card(c){
return `
<div class="card">
<img src="${getImage(c.name)}">
<div class="card-content">
<h3>${c.name}</h3>
<p class="price">${c.price}</p>
<p class="desc">${c.desc}</p>
<button onclick="buy('${c.name}')">Buy</button>
</div>
</div>
`;
}

/* ===== SHOW ===== */
document.getElementById("cars").innerHTML =
cars.map(card).join("");

/* ===== BUY ===== */
function buy(name){
selectedCar=name;
document.getElementById("formBox").style.display="block";
}

/* ===== SUBMIT ===== */
function submitForm(){
let n=document.getElementById("name").value;
let p=document.getElementById("phone").value;
let a=document.getElementById("address").value;

if(!n || !p || !a){
alert("Fill all fields!");
return;
}

alert("Order confirmed for " + selectedCar + " 🚗");
document.getElementById("formBox").style.display="none";
}

</script>

</body>
</html>
