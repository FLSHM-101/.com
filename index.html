<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Premium Marketplace</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#0b0f1a;color:white;}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#020617;
    position:sticky;
    top:0;
    z-index:1000;
}

nav h2{color:#00ffcc;}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

/* HERO */
.hero{
    height:60vh;
    background:url("https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero h1{
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:10px;
}

/* SEARCH */
.search{
    text-align:center;
    margin:20px;
}

.search input{
    padding:10px;
    width:300px;
    border-radius:5px;
    border:none;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:#00ffcc;
    font-weight:bold;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}

/* RESULT */
.result{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#020617;
    padding:15px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<nav>
    <h2>EV Premium Store ⚡</h2>
</nav>

<div class="hero">
    <h1>Electric Cars & Parts Marketplace</h1>
</div>

<div class="search">
    <input type="text" id="search" placeholder="Search cars or parts...">
</div>

<h2 style="text-align:center;">🚗 Cars</h2>
<div class="grid" id="cars"></div>

<h2 style="text-align:center;">🔧 Parts</h2>
<div class="grid" id="parts"></div>

<div class="result" id="result"></div>

<script>

/* 🚗 20+ CARS (كل سيارة عندها صورة مختلفة) */
let cars = [
{name:"Tesla Model 3",price:"40000$",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Tesla Model Y",price:"52000$",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"Tesla Model S",price:"85000$",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Tesla Model X",price:"90000$",img:"https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg"},
{name:"BMW i4",price:"55000$",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"BMW iX",price:"75000$",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"Audi e-tron",price:"70000$",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Audi Q4 e-tron",price:"60000$",img:"https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg"},
{name:"Mercedes EQS",price:"110000$",img:"https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg"},
{name:"Mercedes EQA",price:"55000$",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Hyundai Ioniq 5",price:"45000$",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"Hyundai Ioniq 6",price:"48000$",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Kia EV6",price:"47000$",img:"https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg"},
{name:"Nissan Leaf",price:"32000$",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Ford Mach-E",price:"55000$",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"Volkswagen ID.4",price:"48000$",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Porsche Taycan",price:"120000$",img:"https://images.pexels.com/photos/100650/pexels-photo-100650.jpeg"},
{name:"Chevrolet Bolt",price:"36000$",img:"https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg"},
{name:"Polestar 2",price:"65000$",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Volvo XC40 Recharge",price:"60000$",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"}
];

/* 🔧 40+ PARTS (كل قطعة صورة مختلفة) */
let parts = [
{name:"EV Charger",price:"500$",img:"https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg"},
{name:"Fast Charger",price:"1200$",img:"https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg"},
{name:"Charging Cable",price:"150$",img:"https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg"},
{name:"Battery Pack",price:"5000$",img:"https://images.pexels.com/photos/3806271/pexels-photo-3806271.jpeg"},
{name:"Tires Set",price:"800$",img:"https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg"},
{name:"Wheels",price:"1000$",img:"https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg"},
{name:"Brake Pads",price:"300$",img:"https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg"},
{name:"Motor Controller",price:"2000$",img:"https://images.pexels.com/photos/3806271/pexels-photo-3806271.jpeg"},
{name:"Cooling System",price:"700$",img:"https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg"},
{name:"Inverter",price:"1500$",img:"https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg"},
{name:"Touch Screen",price:"900$",img:"https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg"},
{name:"Car Camera",price:"250$",img:"https://images.pexels.com/photos/3806271/pexels-photo-3806271.jpeg"},
{name:"Parking Sensor",price:"200$",img:"https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg"},
{name:"LED Lights",price:"120$",img:"https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg"},
{name:"GPS System",price:"300$",img:"https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg"}
];

/* CARD */
function create(item){
return `
<div class="card">
<img src="${item.img}">
<div class="card-content">
<h3>${item.name}</h3>
<p class="price">${item.price}</p>
<button onclick="buy('${item.name}')">Buy</button>
</div>
</div>`;
}

/* DISPLAY */
function show(){
document.getElementById("cars").innerHTML = cars.map(create).join("");
document.getElementById("parts").innerHTML = parts.map(create).join("");
}
show();

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let val=this.value.toLowerCase();

document.getElementById("cars").innerHTML =
cars.filter(c=>c.name.toLowerCase().includes(val)).map(create).join("");

document.getElementById("parts").innerHTML =
parts.filter(p=>p.name.toLowerCase().includes(val)).map(create).join("");
});

/* BUY */
function buy(name){
let box=document.getElementById("result");
box.style.display="block";
box.innerText="Added to cart: "+name+" 🛒";
setTimeout(()=>box.style.display="none",3000);
}

</script>

</body>
</html>
